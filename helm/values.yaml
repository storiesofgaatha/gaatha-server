app:
  image:
    name: SET-BY-CICD-IMAGE
    tag: SET-BY-CICD-TAG

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  redis:
    enabled: false
  
  postgresql:
    enabled: true
    fullnameOverride: "gaatha-postgresql"
    architecture: standalone
    auth:
      postgresPassword: "2Ip9-+2%yf`d[hs+nbd1"
      username: ""
      password: ""
      database: ""
    primary:
      persistence: 
        enabled: "true"
        storageClass: ""
        size: 2Gi
  api:
    enabled: true
    replicaCount: 1
    containerPort: 80
    command: ["gunicorn", "gaatha.wsgi:application", "--timeout=40", "--bind", "0.0.0.0:80"]
    resources:
      requests:
        cpu: "2"
        memory: 0.5Gi
      limits:
        cpu: "1"
        memory: 1Gi
        
  worker:
    enabled: false
 
  argoHook:
    enabled: true
    resources:
      requests:
        cpu: "0.1"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    hooks:
      # NOTE: Make sure keys are lowercase
      db-migrate:
        enabled: true
        hook: PostSync
        preserveHistory: true
        command: ["/bin/bash", "-c", "./manage.py wait_for_resources --db && ./manage.py migrate"]
      collect-static:
        enabled: true
        hook: PostSync
        command: ["/bin/bash", "-c", "./manage.py migrate --noinput"]
  env:
    APP_RELEASE: "{{ $.Values.image.tag }}"
    APP_ENVIRONMENT: "{{ $.Values.environment }}"
    TIME_ZONE: "Asia/Kathmandu"
    DEBUG: "false"
    LANGUAGE_CODE: ""
    SESSION_COOKIE_DOMAIN: "{{ required \".app.env.SESSION_COOKIE_DOMAIN\" nil }}"
    CSRF_COOKIE_DOMAIN: "{{ required \".app.env.CSRF_COOKIE_DOMAIN\" nil }}"

  secrets:
    DJANGO_SECRET_KEY: "thoh-2i##o2j^6--_sg-oq!j9ohqipx3_a-c2+"
    # Postgres
    DB_NAME: "{{ $.Values.postgresql.auth.database }}"
    DB_USER: "postgres"
    DB_PWD: "{{ include \"postgresql.v1.primary.fullname\" $.Subcharts.postgresql }}"
    DB_HOST: "{{ include \"postgresql.v1.primary.fullname\" $.Subcharts.postgresql }}"
    DB_PORT: "{{ include \"postgresql.v1.service.port\" $.Subcharts.postgresql }}"
    