type FileFieldType {
  name: String!
  url: String!
}

type FilterChoiceType {
  workCategory: [WorkCategoryType!]
  workTag: [WorkTagType!]
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int! = -1
}

enum Ordering {
  ASC
  DESC
}

type PeopleListType {
  id: ID!
  name: String!
  email: String!
  designation: String!
  qualification: String!
  isCurrentEmployee: Boolean!
  linkedinUrl: String!
  instagramUrl: String!
  artWork: FileFieldType
  profilePicture: FileFieldType
}

type ProjectListType {
  id: ID!
  title: String!
  location: String!
  image: FileFieldType
}

type Query {
  works(filters: WorkFilter, order: WorkOrderType, pagination: OffsetPaginationInput): [WorkListType!]!
  work(pk: ID!): WorkType!
  people(pagination: OffsetPaginationInput): [PeopleListType!]!
  projects(pagination: OffsetPaginationInput): [ProjectListType!]!
  filterChoices: FilterChoiceType!
}

type WorkCategoryType {
  id: ID!
  name: String!
}

input WorkFilter {
  category: ID
  tag: ID
}

type WorkImageType {
  id: ID!
  image: FileFieldType
}

type WorkListType {
  id: ID!
  title: String!
  description: String!
  area: String!
  status: String!
  duration: String!
  location: String!
  category: WorkCategoryType
  tag: WorkTagType
  isCoverImageDark: Boolean!
  order: Int
  artWork: FileFieldType
  coverImage: FileFieldType
  images: [WorkImageType!]!
}

input WorkOrderType {
  order: Ordering
}

type WorkTagType {
  id: ID!
  name: String!
}

type WorkType {
  id: ID!
  title: String!
  description: String!
  area: String!
  status: String!
  duration: String!
  location: String!
  category: WorkCategoryType
  tag: WorkTagType
  isCoverImageDark: Boolean!
  order: Int
  artWork: FileFieldType
  coverImage: FileFieldType
  images: [WorkImageType!]!
}