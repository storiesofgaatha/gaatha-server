type FileFieldType {
  name: String!
  url: String!
  width: Int!
  height: Int!
}

type FilterChoiceType {
  workCategory: [WorkCategoryType!]
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int! = -1
}

enum Ordering {
  ASC
  DESC
}

type PeopleListType {
  id: ID!
  name: String!
  email: String!
  designation: String!
  qualification: String!
  isCurrentEmployee: Boolean!
  isFounder: Boolean!
  linkedinUrl: String!
  instagramUrl: String!
  order: Int
  artWork: FileFieldType
  profilePicture: FileFieldType
}

input PeopleOrderType {
  order: Ordering
}

type Query {
  works(filters: WorkFilter, order: WorkOrderType, pagination: OffsetPaginationInput): [WorkListType!]!
  work(pk: ID!): WorkType!
  people(order: PeopleOrderType, pagination: OffsetPaginationInput): [PeopleListType!]!
  filterChoices: FilterChoiceType!
}

type WorkCategoryType {
  id: ID!
  name: String!
}

input WorkFilter {
  category: ID
  workType: WorkTypeEnum
}

type WorkImageType {
  id: ID!
  image: FileFieldType
}

type WorkListType {
  id: ID!
  title: String!
  workType: WorkTypeEnum!
  subTitle: String!
  description: String!
  area: String!
  status: String!
  duration: String!
  location: String!
  category: WorkCategoryType
  isCoverImageDark: Boolean!
  order: Int
  artWork: FileFieldType
  coverImage: FileFieldType
  images: [WorkImageType!]!
  workTypeLabel: String
}

input WorkOrderType {
  order: Ordering
}

type WorkType {
  id: ID!
  title: String!
  workType: WorkTypeEnum!
  subTitle: String!
  description: String!
  area: String!
  status: String!
  duration: String!
  location: String!
  category: WorkCategoryType
  isCoverImageDark: Boolean!
  order: Int
  artWork: FileFieldType
  coverImage: FileFieldType
  images: [WorkImageType!]!
  workTypeLabel: String
}

enum WorkTypeEnum {
  ARCHITECTURE
  GRAPHICS_AND_VISUALIZATION
}