version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    image: gaatha-server/server
    build:
      context: ./
    tty: true
    environment:
      CI: "true"
      DEBUG: "true"
      DJANGO_SECRET_KEY: "XXXXXXXXXXXXXXXXXXXX"
      DB_NAME: postgres
      DB_USER: postgres
      DB_PWD: postgres
      DB_HOST: db
      DB_PORT: 5432
      LANGUAGE_CODE: en-us
      TIME_ZONE: Asia/Kathmandu
    volumes:
      - ./ci-share/:/ci-share/
    depends_on:
      - db

volumes:
  postgres-data:
