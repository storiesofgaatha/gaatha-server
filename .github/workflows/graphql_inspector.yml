name: CI

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test:
    name: Show changes in schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - uses: kamilkisiela/graphql-inspector@master
        with:
          schema: 'develop:schema.graphql'
          fail-on-breaking: true
