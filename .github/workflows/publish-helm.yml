name: Publish helm

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - project/*
    tags:
      - "v*.*.*"


jobs:
  _:
    uses: toggle-corp/banjo-action/.github/workflows/pipeline.yml@v0.1.0
    with:
      docker__wait_cmd: "./manage.py wait_for_resources --db"
      docker__migration_dummy_test: "gaatha.tests.FakeTest"
      docker__run_graphql_check: true
      docker__compose_file: "gh-docker-compose.yml"
      docker__compose_service_name: "server"
      docker__compose_test_cmd: "/code/scripts/run_tests.sh"
      # Job: Helm
      helm__chart_directory: "./helm"
      # -- Publish
      docker__push: true
      helm__push: true
      # github_release__create: ${{ github.ref_type == 'tag' }}